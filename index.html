<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zodiaco</title>

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background: #f4f4f6;
}

/* ✨ GLIFI SFONDO */
body::before {
    content: "♈ ♉ ♊ ♋ ♌ ♍ ♎ ♏ ♐ ♑ ♒ ♓";
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    opacity: 0.05;
    pointer-events: none;
    white-space: nowrap;
}

/* CONTAINER */
.wrapper {
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    text-align: center;
}

h1 { font-size: 28px; margin-bottom: 6px; }

p { font-size: 16px; color: #666; }

/* ✨ BARRA GLIFI */
.glyphs {
    font-size: 18px;
    letter-spacing: 6px;
    opacity: 0.5;
    margin-bottom: 12px;
}

input, select {
    width: 100%;
    box-sizing: border-box;
    display: block;
    font-size: 18px;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: white;
    text-align: center;
}

button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #111;
    color: white;
}

#risultato {
    margin-top: 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
}

.badge {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 10px;
    background: #eee;
    font-size: 14px;
}

</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>🔮 Zodiaco</h1>

<!-- ✨ GLIFI RIPRISTINATI -->
<div class="glyphs">
♈ ♉ ♊ ♋ ♌ ♍ ♎ ♏ ♐ ♑ ♒ ♓
</div>

<p>Data di nascita</p>
<input type="date" id="data">

<p style="margin-top:14px;">Ora (opzionale)</p>

<select id="ora">
    <option value="">--</option>

    <script>
        for (let i=0;i<24;i++){
            document.write(`<option>${String(i).padStart(2,'0')}</option>`);
        }
    </script>
</select>

<button onclick="calcola()">Calcola segno</button>

<div id="risultato"></div>

</div>
</div>

<script>

function calcola(){

let d = document.getElementById("data").value;
if(!d) return;

let data = new Date(d);
let g = data.getDate();
let m = data.getMonth()+1;

let segno="", elem="", mod="", opp="", pianeta="", periodo="";

if((m==3 && g>=21)||(m==4 && g<=19)){
segno="Ariete ♈"; elem="Fuoco"; mod="Cardinale"; opp="Bilancia ♎"; pianeta="Marte"; periodo="21 Mar - 19 Apr 2026";
}
else if((m==4 && g>=20)||(m==5 && g<=20)){
segno="Toro ♉"; elem="Terra"; mod="Fisso"; opp="Scorpione ♏"; pianeta="Venere"; periodo="20 Apr - 20 Mag 2026";
}
else if((m==5 && g>=21)||(m==6 && g<=20)){
segno="Gemelli ♊"; elem="Aria"; mod="Mobile"; opp="Sagittario ♐"; pianeta="Mercurio"; periodo="21 Mag - 20 Giu 2026";
}
else if((m==6 && g>=21)||(m==7 && g<=22)){
segno="Cancro ♋"; elem="Acqua"; mod="Cardinale"; opp="Capricorno ♑"; pianeta="Luna"; periodo="21 Giu - 22 Lug 2026";
}
else if((m==7 && g>=23)||(m==8 && g<=22)){
segno="Leone ♌"; elem="Fuoco"; mod="Fisso"; opp="Acquario ♒"; pianeta="Sole"; periodo="22 Lug - 22 Ago 2026";
}
else if((m==8 && g>=23)||(m==9 && g<=22)){
segno="Vergine ♍"; elem="Terra"; mod="Mobile"; opp="Pesci ♓"; pianeta="Mercurio"; periodo="23 Ago - 22 Set 2026";
}
else if((m==9 && g>=23)||(m==10 && g<=22)){
segno="Bilancia ♎"; elem="Aria"; mod="Cardinale"; opp="Ariete ♈"; pianeta="Venere"; periodo="23 Set - 22 Ott 2026";
}
else if((m==10 && g>=23)||(m==11 && g<=21)){
segno="Scorpione ♏"; elem="Acqua"; mod="Fisso"; opp="Toro ♉"; pianeta="Plutone"; periodo="23 Ott - 21 Nov 2026";
}
else if((m==11 && g>=22)||(m==12 && g<=21)){
segno="Sagittario ♐"; elem="Fuoco"; mod="Mobile"; opp="Gemelli ♊"; pianeta="Giove"; periodo="22 Nov - 21 Dic 2026";
}
else if((m==12 && g>=22)||(m==1 && g<=19)){
segno="Capricorno ♑"; elem="Terra"; mod="Cardinale"; opp="Cancro ♋"; pianeta="Saturno"; periodo="21 Dic - 19 Gen 2026";
}
else if((m==1 && g>=20)||(m==2 && g<=18)){
segno="Acquario ♒"; elem="Aria"; mod="Fisso"; opp="Leone ♌"; pianeta="Urano"; periodo="20 Gen - 18 Feb 2026";
}
else{
segno="Pesci ♓"; elem="Acqua"; mod="Mobile"; opp="Vergine ♓"; pianeta="Nettuno"; periodo="18 Feb - 20 Mar 2026";
}

document.getElementById("risultato").innerHTML =
"<div class='badge'>"+segno+"</div><br><br>"+
"<b>Periodo:</b> "+periodo+"<br>"+
"<b>Elemento:</b> "+elem+"<br>"+
"<b>Modalità:</b> "+mod+"<br>"+
"<b>Pianeta dominante:</b> "+pianeta+"<br>"+
"<b>Segno opposto:</b> "+opp;

}

</script>

</body>
</html>
