<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zodiaco</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #111;
    }

    .app {
      background: #ffffff;
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .label {
      font-size: 13px;
      color: #6b7280;
      text-align: left;
      margin: 10px 0 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      background: #fff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #000;
    }

    .result {
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      background: #f3f4f6;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    b {
      color: #111;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>🔮 Zodiaco</h1>

    <div class="label">Data di nascita</div>
    <input type="date" id="birthdate" />

    <div class="label">Ora (opzionale)</div>
    <select id="ora">
      <option value="--">--</option>
    </select>

    <button onclick="calcolaSegno()">Calcola segno</button>

    <div class="result" id="risultato"></div>
  </div>

  <script>
    function calcolaSegno() {

      const date = document.getElementById("birthdate").value;

      if (!date) {
        document.getElementById("risultato").innerHTML = "Inserisci una data";
        return;
      }

      const d = new Date(date);
      const giorno = d.getDate();
      const mese = d.getMonth() + 1;

      let segno = "";
      let periodo = "";
      let elem = "";
      let mod = "";
      let pianeta = "";
      let opp = "";

      if ((mese == 1 && giorno >= 20) || (mese == 2 && giorno <= 18)) {
        segno = "Acquario";
        periodo = "20 Gen - 18 Feb";
        elem = "Aria";
        mod = "Fisso";
        pianeta = "Urano / Saturno";
        opp = "Leone";
      }
      else if ((mese == 2 && giorno >= 19) || (mese == 3 && giorno <= 20)) {
        segno = "Pesci";
        periodo = "19 Feb - 20 Mar";
        elem = "Acqua";
        mod = "Mobile";
        pianeta = "Nettuno / Giove";
        opp = "Vergine";
      }
      else if ((mese == 3 && giorno >= 21) || (mese == 4 && giorno <= 19)) {
        segno = "Ariete";
        periodo = "21 Mar - 19 Apr";
        elem = "Fuoco";
        mod = "Cardinale";
        pianeta = "Marte";
        opp = "Bilancia";
      }
      else if ((mese == 4 && giorno >= 20) || (mese == 5 && giorno <= 20)) {
        segno = "Toro";
        periodo = "20 Apr - 20 Mag";
        elem = "Terra";
        mod = "Fisso";
        pianeta = "Venere";
        opp = "Scorpione";
      }
      else if ((mese == 5 && giorno >= 21) || (mese == 6 && giorno <= 20)) {
        segno = "Gemelli";
        periodo = "21 Mag - 20 Giu";
        elem = "Aria";
        mod = "Mobile";
        pianeta = "Mercurio";
        opp = "Sagittario";
      }
      else if ((mese == 6 && giorno >= 21) || (mese == 7 && giorno <= 22)) {
        segno = "Cancro";
        periodo = "21 Giu - 22 Lug";
        elem = "Acqua";
        mod = "Cardinale";
        pianeta = "Luna";
        opp = "Capricorno";
      }
      else if ((mese == 7 && giorno >= 23) || (mese == 8 && giorno <= 22)) {
        segno = "Leone";
        periodo = "23 Lug - 22 Ago";
        elem = "Fuoco";
        mod = "Fisso";
        pianeta = "Sole";
        opp = "Acquario";
      }
      else if ((mese == 8 && giorno >= 23) || (mese == 9 && giorno <= 22)) {
        segno = "Vergine";
        periodo = "23 Ago - 22 Set";
        elem = "Terra";
        mod = "Mobile";
        pianeta = "Mercurio";
        opp = "Pesci";
      }
      else if ((mese == 9 && giorno >= 23) || (mese == 10 && giorno <= 22)) {
        segno = "Bilancia";
        periodo = "23 Set - 22 Ott";
        elem = "Aria";
        mod = "Cardinale";
        pianeta = "Venere";
        opp = "Ariete";
      }
      else if ((mese == 10 && giorno >= 23) || (mese == 11 && giorno <= 21)) {
        segno = "Scorpione";
        periodo = "23 Ott - 21 Nov";
        elem = "Acqua";
        mod = "Fisso";
        pianeta = "Plutone / Marte";
        opp = "Toro";
      }
      else if ((mese == 11 && giorno >= 22) || (mese == 12 && giorno <= 21)) {
        segno = "Sagittario";
        periodo = "22 Nov - 21 Dic";
        elem = "Fuoco";
        mod = "Mobile";
        pianeta = "Giove";
        opp = "Gemelli";
      }
      else {
        segno = "Capricorno";
        periodo = "22 Dic - 19 Gen";
        elem = "Terra";
        mod = "Cardinale";
        pianeta = "Saturno";
        opp = "Cancro";
      }

      document.getElementById("risultato").innerHTML =
        "<div class='badge'>" + segno + "</div><br><br>" +
        "<b>Periodo:</b> " + periodo + "<br>" +
        "<b>Elemento:</b> " + elem + "<br>" +
        "<b>Modalità:</b> " + mod + "<br>" +
        "<b>Pianeta dominante:</b> " + pianeta + "<br>" +
        "<b>Segno opposto:</b> " + opp;
    }
  </script>

</body>
</html>
