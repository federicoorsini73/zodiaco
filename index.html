<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zodiaco</title>

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #0f172a; /* DARK */
    color: #e2e8f0;
}

.wrapper {
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #1e293b; /* DARK CARD */
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
}

h1 { font-size: 28px; margin-bottom: 8px; color: #f1f5f9; }

p { font-size: 16px; color: #94a3b8; }

input, select {
    width: 100%;
    box-sizing: border-box;
    display: block;
    font-size: 18px;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
}

/* FIX: Rende visibile e bianca l'icona del calendario su Chrome/Safari/Edge */
input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

#risultato {
    margin-top: 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
}

/* MODIFICATO: Badge più grande e leggibile per il segno zodiacale */
.badge {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: #334155;
    font-size: 22px;
    font-weight: bold;
    color: #e2e8f0;
}

</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>🔮 Zodiaco</h1>

<p>Data di nascita</p>
<input type="date" id="data">

<p style="margin-top:14px;">Ora (opzionale)</p>

<select id="ora">
    <option value="">--</option>
    <script>
        for (let i=0;i<24;i++){
            document.write(`<option>${String(i).padStart(2,'0')}</option>`);
        }
    </script>
</select>

<button onclick="calcola()">Calcola segno</button>

<div id="risultato"></div>

</div>
</div>

<script>

/*
========================================================
FUNZIONE CALCOLO SEGNO
========================================================
*/
function calcola(){

let d = document.getElementById("data").value;
if(!d) return;

let data = new Date(d);
let g = data.getDate();
let m = data.getMonth()+1;
let anno = data.getFullYear();

let segno="", elem="", mod="", opp="", pianeta="", periodoText="";

if((m==3 && g>=21)||(m==4 && g<=19)){
segno="Ariete"; elem="Fuoco"; mod="Cardinale"; opp="Bilancia"; pianeta="Marte"; periodoText=`21 Mar - 19 Apr ${anno}`;
}
else if((m==4 && g>=20)||(m==5 && g<=20)){
segno="Toro"; elem="Terra"; mod="Fisso"; opp="Scorpione"; pianeta="Venere"; periodoText=`20 Apr - 20 Mag ${anno}`;
}
else if((m==5 && g>=21)||(m==6 && g<=20)){
segno="Gemelli"; elem="Aria"; mod="Mobile"; opp="Sagittario"; pianeta="Mercurio"; periodoText=`21 Mag - 20 Giu ${anno}`;
}
else if((m==6 && g>=21)||(m==7 && g<=22)){
segno="Cancro"; elem="Acqua"; mod="Cardinale"; opp="Capricorno"; pianeta="Luna"; periodoText=`21 Giu - 22 Lug ${anno}`;
}
else if((m==7 && g>=23)||(m==8 && g<=22)){
segno="Leone"; elem="Fuoco"; mod="Fisso"; opp="Acquario"; pianeta="Sole"; periodoText=`22 Lug - 22 Ago ${anno}`;
}
else if((m==8 && g>=23)||(m==9 && g<=22)){
segno="Vergine"; elem="Terra"; mod="Mobile"; opp="Pesci"; pianeta="Mercurio"; periodoText=`23 Ago - 22 Set ${anno}`;
}
else if((m==9 && g>=23)||(m==10 && g<=22)){
segno="Bilancia"; elem="Aria"; mod="Cardinale"; opp="Ariete"; pianeta="Venere"; periodoText=`23 Set - 22 Ott ${anno}`;
}
else if((m==10 && g>=23)||(m==11 && g<=21)){
segno="Scorpione"; elem="Acqua"; mod="Fisso"; opp="Toro"; pianeta="Plutone"; periodoText=`23 Ott - 21 Nov ${anno}`;
}
else if((m==11 && g>=22)||(m==12 && g<=21)){
segno="Sagittario"; elem="Fuoco"; mod="Mobile"; opp="Gemelli"; pianeta="Giove"; periodoText=`22 Nov - 21 Dic ${anno}`;
}
else if((m==12 && g>=22)||(m==1 && g<=19)){
let annoFine = (m == 12) ? anno + 1 : anno;
let annoInizio = (m == 1) ? anno - 1 : anno;
segno="Capricorno"; elem="Terra"; mod="Cardinale"; opp="Cancro"; pianeta="Saturno"; periodoText=`21 Dic ${annoInizio} - 19 Gen ${annoFine}`;
}
else if((m==1 && g>=20)||(m==2 && g<=18)){
segno="Acquario"; elem="Aria"; mod="Fisso"; opp="Leone"; pianeta="Urano"; periodoText=`20 Gen - 18 Feb ${anno}`;
}
else{
segno="Pesci"; elem="Acqua"; mod="Mobile"; opp="Vergine"; pianeta="Nettuno"; periodoText=`18 Feb - 20 Mar ${anno}`;
}

const glyph = {
"Ariete":"♈",
"Toro":"♉",
"Gemelli":"♊",
"Cancro":"♋",
"Leone":"♌",
"Vergine":"♍",
"Bilancia":"♎",
"Scorpione":"♏",
"Sagittario":"♐",
"Capricorno":"♑",
"Acquario":"♒",
"Pesci":"♓"
};

document.getElementById("risultato").innerHTML =
"<div class='badge'>"+segno+" "+glyph[segno]+"</div><br><br>"+
"<b>Periodo:</b> "+periodoText+"<br>"+
"<b>Elemento:</b> "+elem+"<br>"+
"<b>Modalità:</b> "+mod+"<br>"+
"<b>Pianeta dominante:</b> "+pianeta+"<br>"+
"<b>Segno opposto:</b> "+opp+" "+glyph[opp];

}

</script>

</body>
</html>
