<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zodiaco</title>

<script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.wrapper {
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
}

h1 { font-size: 28px; margin-bottom: 8px; color: #f1f5f9; }

p { font-size: 16px; color: #94a3b8; }

input, select {
    width: 100%;
    box-sizing: border-box;
    display: block;
    font-size: 18px;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

#risultato {
    margin-top: 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
}

.badge {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: #334155;
    font-size: 22px;
    font-weight: bold;
    color: #e2e8f0;
}

/* Stile sobrio per gli avvisi di nota e cuspide */
.avviso-nota {
    display: block;
    margin-top: 10px;
    font-size: 14px;
    color: #f59e0b; /* Colore ambra/arancione discreto */
    font-style: italic;
    line-height: 1.4;
}

</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>🔮 Zodiaco</h1>

<p>Data di nascita</p>
<input type="date" id="data">

<p style="margin-top:14px;">Ora (opzionale)</p>
<select id="ora">
    <option value="">--</option>
    <script>
        for (let i=0;i<24;i++){
            document.write(`<option>${String(i).padStart(2,'0')}</option>`);
        }
    </script>
</select>

<button onclick="calcola()">Calcola segno</button>

<div id="risultato"></div>

</div>
</div>

<script>

// Database delle proprietà dei segni
const infoSegni = {
    0:  { nome: "Ariete",      elem: "Fuoco",  mod: "Cardinale", opp: "Bilancia",   pianeta: "Marte",    glyph: "♈" },
    1:  { nome: "Toro",        elem: "Terra",  mod: "Fisso",     opp: "Scorpione",  pianeta: "Venere",   glyph: "♉" },
    2:  { nome: "Gemelli",     elem: "Aria",   mod: "Mobile",    opp: "Sagittario", pianeta: "Mercurio", glyph: "♊" },
    3:  { nome: "Cancro",      elem: "Acqua",  mod: "Cardinale", opp: "Capricorno", pianeta: "Luna",     glyph: "♋" },
    4:  { nome: "Leone",       elem: "Fuoco",  mod: "Fisso",     opp: "Acquario",   pianeta: "Sole",     glyph: "♌" },
    5:  { nome: "Vergine",     elem: "Terra",  mod: "Mobile",    opp: "Pesci",      pianeta: "Mercurio", glyph: "♍" },
    6:  { nome: "Bilancia",    elem: "Aria",   mod: "Cardinale", opp: "Ariete",     pianeta: "Venere",   glyph: "♎" },
    7:  { nome: "Scorpione",   elem: "Acqua",  mod: "Fisso",     opp: "Toro",       pianeta: "Plutone",  glyph: "♏" },
    8:  { nome: "Sagittario",  elem: "Fuoco",  mod: "Mobile",    opp: "Gemelli",    pianeta: "Giove",    glyph: "♐" },
    9:  { nome: "Capricorno",  elem: "Terra",  mod: "Cardinale", opp: "Cancro",     pianeta: "Saturno",  glyph: "♑" },
    10: { nome: "Acquario",    elem: "Aria",   mod: "Fisso",     opp: "Leone",      pianeta: "Urano",    glyph: "♒" },
    11: { nome: "Pesci",       elem: "Acqua",  mod: "Mobile",    opp: "Vergine",    pianeta: "Nettuno",  glyph: "♓" }
};

function calcola(){
    let dataVal = document.getElementById("data").value;
    if(!dataVal) return;

    let oraInserita = document.getElementById("ora").value;
    let oraVal = oraInserita || "12"; // Fallback a mezzogiorno se vuoto
    
    // Crea l'oggetto data combinando i valori dell'utente
    let dataLocale = new Date(`${dataVal}T${oraVal.padStart(2,'0')}:00:00`);
    
    // Converte la data per la libreria astronomica
    let astronomiaData = Astronomy.MakeTime(dataLocale);
    
    // Calcola la posizione esatta del Sole in gradi (0-360)
    let coords = Astronomy.EclipticGeoMoon(Astronomy.Body.Sun, astronomiaData);
    let longitudineSolare = coords.elon; 

    // Trova l'indice del segno zodiacale (0-11)
    let indexSegno = Math.floor(longitudineSolare / 30);
    
    // Calcolo della cuspide: controlla se il sole è a meno di 1 grado dall'inizio o dalla fine del segno
    let posizioneNelSegno = longitudineSolare % 30;
    let èCuspide = (posizioneNelSegno < 1.0) || (posizioneNelSegno > 29.0);

    let s = infoSegni[indexSegno];
    let oppGlyph = infoSegni[(indexSegno + 6) % 12].glyph;
    let anno = dataLocale.getFullYear();
    
    // Calcolo dei passaggi esatti del sole per il periodo
    let inizioGrado = indexSegno * 30;
    let fineGrado = ((indexSegno + 1) * 30) % 360;
    
    let dataInizio = Astronomy.SearchSunLongitude(inizioGrado, astronomiaData, -40);
    let dataFine = Astronomy.SearchSunLongitude(fineGrado, astronomiaData, 40);

    let opzioniFormato = { day: 'numeric', month: 'short', year: 'numeric' };
    let stringaInizio = dataInizio.date.toLocaleDateString('it-IT', opzioniFormato);
    let stringaFine = dataFine.date.toLocaleDateString('it-IT', opzioniFormato);

    // Costruisce i testi di avviso in base alle scelte dell'utente
    let testoAvviso = "";
    if (èCuspide) {
        testoAvviso += "<span class='avviso-nota'>⚠️ NB: Questa data si trova in una zona di cuspide (passaggio tra due segni).</span>";
    }
    if (!oraInserita) {
        testoAvviso += "<span class='avviso-nota'>ℹ️ Ora non inserita: calcolo stimato a metà giornata (ore 12:00). Per le date di transizione l'ora esatta è fondamentale.</span>";
    }

    // Stampa il risultato finale sulla pagina
    document.getElementById("risultato").innerHTML =
    "<div class='badge'>" + s.nome + " " + s.glyph + "</div>" + 
    testoAvviso + "<br><br>" +
    "<b>Periodo esatto (" + anno + "):</b> dal " + stringaInizio + " al " + stringaFine + "<br>" +
    "<b>Elemento:</b> " + s.elem + "<br>" +
    "<b>Modalità:</b> " + s.mod + "<br>" +
    "<b>Pianeta dominante:</b> " + s.pianeta + "<br>" +
    "<b>Segno opposto:</b> " + s.opp + " " + oppGlyph;
}

</script>

</body>
</html>
