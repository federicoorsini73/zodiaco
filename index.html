<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zodiaco</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      text-align: center;
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.4;
      text-align: left;
    }

    .sign {
      font-size: 26px;
      margin-top: 8px;
      display: block;
    }

    .glyph {
      font-size: 20px;
      opacity: 0.8;
      margin-left: 6px;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin: 12px 0;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>♊ Zodiaco</h1>

    <input type="date" id="birthdate" />

    <button onclick="calcolaSegno()">Scopri il segno</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calcolaSegno() {
      const date = document.getElementById("birthdate").value;

      if (!date) {
        document.getElementById("result").innerText = "Inserisci una data";
        return;
      }

      const d = new Date(date);
      const giorno = d.getDate();
      const mese = d.getMonth() + 1;

      let segno = "";
      let descrizione = "";
      let opp = "";

      if ((mese == 1 && giorno >= 20) || (mese == 2 && giorno <= 18)) {
        segno = "Acquario"; descrizione = "Indipendente, originale, visionario"; opp = "Leone";
      }
      else if ((mese == 2 && giorno >= 19) || (mese == 3 && giorno <= 20)) {
        segno = "Pesci"; descrizione = "Sensibile, intuitivo, empatico"; opp = "Vergine";
      }
      else if ((mese == 3 && giorno >= 21) || (mese == 4 && giorno <= 19)) {
        segno = "Ariete"; descrizione = "Energia, impulsività, leadership"; opp = "Bilancia";
      }
      else if ((mese == 4 && giorno >= 20) || (mese == 5 && giorno <= 20)) {
        segno = "Toro"; descrizione = "Stabilità, concretezza, pazienza"; opp = "Scorpione";
      }
      else if ((mese == 5 && giorno >= 21) || (mese == 6 && giorno <= 20)) {
        segno = "Gemelli"; descrizione = "Curioso, comunicativo, versatile"; opp = "Sagittario";
      }
      else if ((mese == 6 && giorno >= 21) || (mese == 7 && giorno <= 22)) {
        segno = "Cancro"; descrizione = "Emotivo, protettivo, affettuoso"; opp = "Capricorno";
      }
      else if ((mese == 7 && giorno >= 23) || (mese == 8 && giorno <= 22)) {
        segno = "Leone"; descrizione = "Carismatico, forte, creativo"; opp = "Acquario";
      }
      else if ((mese == 8 && giorno >= 23) || (mese == 9 && giorno <= 22)) {
        segno = "Vergine"; descrizione = "Preciso, analitico, affidabile"; opp = "Pesci";
      }
      else if ((mese == 9 && giorno >= 23) || (mese == 10 && giorno <= 22)) {
        segno = "Bilancia"; descrizione = "Equilibrato, sociale, armonioso"; opp = "Ariete";
      }
      else if ((mese == 10 && giorno >= 23) || (mese == 11 && giorno <= 21)) {
        segno = "Scorpione"; descrizione = "Intenso, profondo, determinato"; opp = "Toro";
      }
      else if ((mese == 11 && giorno >= 22) || (mese == 12 && giorno <= 21)) {
        segno = "Sagittario"; descrizione = "Libero, ottimista, avventuroso"; opp = "Gemelli";
      }
      else {
        segno = "Capricorno"; descrizione = "Ambizioso, disciplinato, concreto"; opp = "Cancro";
      }

      const glyph = {
        "Ariete": "♈",
        "Toro": "♉",
        "Gemelli": "♊",
        "Cancro": "♋",
        "Leone": "♌",
        "Vergine": "♍",
        "Bilancia": "♎",
        "Scorpione": "♏",
        "Sagittario": "♐",
        "Capricorno": "♑",
        "Acquario": "♒",
        "Pesci": "♓"
      };

      document.getElementById("result").innerHTML =
        "Il tuo segno è:<br>" +
        "<span class='sign'>" + segno + " <span class='glyph'>" + glyph[segno] + "</span></span><br>" +
        "<div style='font-weight:normal; margin-top:8px'>" + descrizione + "</div>" +
        "<hr>" +
        "Segno opposto:<br>" +
        "<span class='sign'>" + opp + " <span class='glyph'>" + glyph[opp] + "</span></span>";
    }
  </script>

</body>
</html>
