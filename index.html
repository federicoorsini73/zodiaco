<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Zodiaco</title>

<style>

html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.wrapper {
    min-height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.card {
    width: 100%;
    max-width: 420px;
    background: #1e293b;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    text-align: center;
}

h1 { font-size: 28px; margin-bottom: 8px; color: #f1f5f9; }

p { font-size: 16px; color: #94a3b8; }

input, select {
    width: 100%;
    box-sizing: border-box;
    display: block;
    font-size: 18px;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1);
    cursor: pointer;
}

button {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

#risultato {
    margin-top: 20px;
    text-align: left;
    font-size: 16px;
    line-height: 1.6;
}

.badge {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 12px;
    background: #334155;
    font-size: 22px;
    font-weight: bold;
    color: #e2e8f0;
}

.avviso-nota {
    display: block;
    margin-top: 10px;
    font-size: 14px;
    color: #f59e0b;
    font-style: italic;
    line-height: 1.4;
}

</style>

</head>

<body>

<div class="wrapper">
<div class="card">

<h1>🔮 Zodiaco</h1>

<p>Data di nascita</p>
<input type="date" id="data">

<p style="margin-top:14px;">Ora (opzionale)</p>
<select id="ora">
    <option value="">--</option>
    <script>
        for (let i=0;i<24;i++){
            document.write(`<option>${String(i).padStart(2,'0')}</option>`);
        }
    </script>
</select>

<button onclick="calcola()">Calcola segno</button>

<div id="risultato"></div>

</div>
</div>

<script>

// Formule Algoritmiche pure basate sullo standard JPL/NASA
const AstroEngineNative = {
    toJulian: function(date) {
        return (date.getTime() / 86400000) + 2440587.5;
    },
    getTrueLongitude: function(date) {
        let jd = this.toJulian(date);
        let T = (jd - 2451545.0) / 36525.0;
        
        // Longitudine media geometrica del Sole
        let L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
        // Anomalia media del Sole
        let M = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
        
        // Correzione dell'orbita (Equazione del centro)
        let C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M * Math.PI / 180)
              + (0.019993 - 0.000101 * T) * Math.sin(2 * M * Math.PI / 180)
              + 0.000289 * Math.sin(3 * M * Math.PI / 180);
              
        let longitudineVera = (L0 + C) % 360;
        if (longitudineVera < 0) longitudineVera += 360;
        return longitudineVera;
    },
    findCuspDate: function(targetDeg, baseDate, direction) {
        let tempDate = new Date(baseDate.getTime());
        let step = direction * 60 * 60 * 1000; // Scansione oraria per massima precisione
        
        for (let i = 0; i < 960; i++) {
            let currentL = this.getTrueLongitude(tempDate);
            let diff = (currentL - targetDeg + 360) % 360;
            if (diff > 180) diff -= 360;
            
            if (Math.abs(diff) < 0.04) {
                return tempDate;
            }
            tempDate.setTime(tempDate.getTime() + step);
        }
        return tempDate;
    }
};

const infoSegni = {
    0:  { nome: "Ariete",      elem: "Fuoco",  mod: "Cardinale", opp: "Bilancia",   pianeta: "Marte",    glyph: "♈" },
    1:  { nome: "Toro",        elem: "Terra",  mod: "Fisso",     opp: "Scorpione",  pianeta: "Venere",   glyph: "♉" },
    2:  { nome: "Gemelli",     elem: "Aria",   mod: "Mobile",    opp: "Sagittario", pianeta: "Mercurio", glyph: "♊" },
    3:  { nome: "Cancro",      elem: "Acqua",  mod: "Cardinale", opp: "Capricorno", pianeta: "Luna",     glyph: "♋" },
    4:  { nome: "Leone",       elem: "Fuoco",  mod: "Fisso",     opp: "Acquario",   pianeta: "Sole",     glyph: "♌" },
    5:  { nome: "Vergine",     elem: "Terra",  mod: "Mobile",    opp: "Pesci",      pianeta: "Mercurio", glyph: "♍" },
    6:  { nome: "Bilancia",    elem: "Aria",   mod: "Cardinale", opp: "Ariete",     pianeta: "Venere",   glyph: "♎" },
    7:  { nome: "Scorpione",   elem: "Acqua",  mod: "Fisso",     opp: "Toro",       pianeta: "Plutone",  glyph: "♏" },
    8:  { nome: "Sagittario",  elem: "Fuoco",  mod: "Mobile",    opp: "Gemelli",    pianeta: "Giove",    glyph: "♐" },
    9:  { nome: "Capricorno",  elem: "Terra",  mod: "Cardinale", opp: "Cancro",     pianeta: "Saturno",  glyph: "♑" },
    10: { nome: "Acquario",    elem: "Aria",   mod: "Fisso",     opp: "Leone",      pianeta: "Urano",    glyph: "♒" },
    11: { nome: "Pesci",       elem: "Acqua",  mod: "Mobile",    opp: "Vergine",    pianeta: "Nettuno",  glyph: "♓" }
};

function calcola(){
    let dataVal = document.getElementById("data").value;
    if(!dataVal) return;

    let oraInserita = document.getElementById("ora").value;
    let oraVal = oraInserita || "12";
    
    let pezzi = dataVal.split("-");
    let a = parseInt(pezzi[0], 10);
    let m = parseInt(pezzi[1], 10) - 1;
    let g = parseInt(pezzi[2], 10);
    let h = parseInt(oraVal, 10);

    // Creiamo la data nativa pulita
    let dataLocale = new Date(Date.UTC(a, m, g, h, 0, 0));
    
    // Eseguiamo il calcolo con il nostro algoritmo sicuro
    let longitudineSolare = AstroEngineNative.getTrueLongitude(dataLocale); 

    let indexSegno = Math.floor(longitudineSolare / 30);
    let posizioneNelSegno = longitudineSolare % 30;
    let èCuspide = (posizioneNelSegno < 1.0) || (posizioneNelSegno > 29.0);

    let s = infoSegni[indexSegno];
    let oppGlyph = infoSegni[(indexSegno + 6) % 12].glyph;
    
    // Calcolo dei limiti temporali esatti
    let inizioGrado = indexSegno * 30;
    let fineGrado = ((indexSegno + 1) * 30) % 360;
    
    let dataInizio = AstroEngineNative.findCuspDate(inizioGrado, dataLocale, -1);
    let dataFine = AstroEngineNative.findCuspDate(fineGrado, dataLocale, 1);

    let opzioniFormato = { day: 'numeric', month: 'short' };
    let stringaInizio = dataInizio.toLocaleDateString('it-IT', opzioniFormato);
    let stringaFine = dataFine.toLocaleDateString('it-IT', opzioniFormato);

    let testoAvviso = "";
    if (èCuspide) {
        testoAvviso += "<span class='avviso-nota'>⚠️ NB: Questa data si trova in una zona di cuspide (passaggio tra due segni).</span>";
    }
    if (!oraInserita) {
        testoAvviso += "<span class='avviso-nota'>ℹ️ Ora non inserita: calcolo stimato a metà giornata (ore 12:00 UTC). Per le date di transizione l'ora esatta è fondamentale.</span>";
    }

    document.getElementById("risultato").innerHTML =
    "<div class='badge'>" + s.nome + " " + s.glyph + "</div>" + 
    testoAvviso + "<br><br>" +
    "<b>Periodo esatto (" + a + "):</b> dal " + stringaInizio + " al " + stringaFine + "<br>" +
    "<b>Elemento:</b> " + s.elem + "<br>" +
    "<b>Modalità:</b> " + s.mod + "<br>" +
    "<b>Pianeta dominante:</b> " + s.pianeta + "<br>" +
    "<b>Segno opposto:</b> " + s.opp + " " + oppGlyph;
}

</script>

</body>
</html>
